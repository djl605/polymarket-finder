name: Polymarket Scanner

on:
  schedule:
    # Run every 3 hours
    - cron: '0 */3 * * *'
  # Allow manual triggering
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code from main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Fetch state and research files from bot-state branch
        run: |
          git fetch origin bot-state:bot-state 2>/dev/null || echo "No bot-state branch yet"
          if git show-ref --verify --quiet refs/heads/bot-state; then
            git checkout bot-state -- state.json 2>/dev/null || echo "No state.json yet"
            git checkout bot-state -- research/ 2>/dev/null || echo "No research directory yet"
          fi
        continue-on-error: true
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Run scanner
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          MIN_MARKET_AGE_DAYS: ${{ vars.MIN_MARKET_AGE_DAYS || '7' }}
          MAX_MARKET_VOLUME_DOLLARS: ${{ vars.MAX_MARKET_VOLUME_DOLLARS || '10000' }}
          MAX_SPREAD_CENTS: ${{ vars.MAX_SPREAD_CENTS || '6' }}
          MIN_MARKET_PROBABILITY: ${{ vars.MIN_MARKET_PROBABILITY || '0.15' }}
          MAX_MARKET_PROBABILITY: ${{ vars.MAX_MARKET_PROBABILITY || '0.85' }}
          CACHE_MIN_AGE_DAYS: ${{ vars.CACHE_MIN_AGE_DAYS || '4' }}
          CACHE_MAX_AGE_DAYS: ${{ vars.CACHE_MAX_AGE_DAYS || '10' }}
          ALERT_COOLDOWN_DAYS: ${{ vars.ALERT_COOLDOWN_DAYS || '7' }}
          MAX_ALERTS_PER_RUN: ${{ vars.MAX_ALERTS_PER_RUN || '5' }}
          VERBOSE_LOGS: ${{ vars.VERBOSE_LOGS || 'false' }}
          MAX_CONCURRENT_ANALYSES: ${{ vars.MAX_CONCURRENT_ANALYSES || '3' }}
        run: npm start
      
      - name: Commit state to bot-state branch
        run: |
          git config user.name "polymarket-bot[bot]"
          git config user.email "polymarket-bot[bot]@users.noreply.github.com"
          
          # Save state.json and research files to temp location before switching branches
          if [ -f state.json ]; then
            cp state.json /tmp/state.json
          else
            echo "No state.json file to commit"
            exit 0
          fi
          
          # Save research directory if it exists
          if [ -d research ]; then
            cp -r research /tmp/research
          fi
          
          # Create or checkout bot-state branch
          git fetch origin bot-state:bot-state 2>/dev/null || git checkout --orphan bot-state
          git checkout bot-state 2>/dev/null || git checkout --orphan bot-state
          
          # Remove all files from bot-state branch
          git rm -rf . 2>/dev/null || true
          
          # Restore state.json from temp location
          cp /tmp/state.json state.json
          
          # Restore research directory if it exists
          if [ -d /tmp/research ]; then
            cp -r /tmp/research .
          fi
          
          # Commit the state file and research files
          git add state.json
          git add -f research/*.md 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update market state and research - $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          git push origin bot-state
